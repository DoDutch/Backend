# 테스트 전용 설정 (H2 인메모리 DB, 환경변수 스텁)
spring:
  config:
    import: ""

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-request-size: 50MB
      max-file-size: 50MB
      enabled: true

# Kakao OAuth2 Configuration (테스트 더미)
kakao:
  client-id: test-kakao-client-id
  redirect-url: http://localhost:8080/api/users/login/oauth/kakao

# JWT Configuration (256비트 이상 테스트 키)
jwt:
  secret-key: TestSecretKeyForJwtTokenThatIsLongEnoughToMeetTheMinimumRequirementOf256Bits1234567890

server:
  port: 8080

# KakaoPay Configuration (테스트 더미)
kakaopay:
  base-url: http://localhost:9999
  cid: TC0ONETIME
  secret-key: test-kakaopay-secret-key
  approval-url: http://localhost:8080/api/kakaopay/approve-callback
  premium-approval-url: http://localhost:8080/auth/approve-callback
  cancel-url: http://localhost:8080/api/kakaopay/cancel-callback
  fail-url: http://localhost:8080/api/kakaopay/fail-callback

# OpenAI Configuration (테스트 더미)
openai:
  model: gpt-4.1
  api:
    key: test-openai-api-key
    url: http://localhost:9999/v1/chat/completions

# Flask Configuration (테스트 더미)
flask:
  url: http://localhost:9999/predict

# AWS S3 (테스트 더미)
cloud:
  aws:
    credentials:
      access-key: test-aws-access-key
      secret-key: test-aws-secret-key
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket
      path:
        trip-main: trip-images
        expense-main: expense-images

# Naver OCR (테스트 더미)
naver:
  service:
    base-url: http://localhost:9999
    endpoint: /test-ocr
    secretKey: test-naver-secret-key
