name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 Pull Request의 코드 변경 사항을 리뷰해주세요.
            다음 항목을 중점적으로 확인해주세요:
            1. 버그 및 정확성: 잠재적 NullPointerException, 로직 오류
            2. 보안: JWT 처리, 인증/인가, 입력 검증
            3. JPA 성능: N+1 쿼리, cascade/fetch 설정
            4. API 설계: ResponseDTO 패턴 준수
            리뷰는 한국어로 작성해주세요.
            심각한 문제만 지적하고, 사소한 스타일 이슈는 넘어가주세요.

            중요: /review 스킬을 사용하지 마세요. git diff를 직접 읽고 분석하세요.
            마지막 응답은 반드시 리뷰 내용을 텍스트로 직접 출력해야 합니다. 도구 호출로 끝내지 마세요.
          claude_args: "--max-turns 15"

  interactive:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 5"
